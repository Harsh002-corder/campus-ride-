<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      />
    </noscript>
    <script>
      (function () {
        var KEY = "campusride-theme";
        var root = document.documentElement;
        var theme = "light";

        try {
          var stored = localStorage.getItem(KEY);
          if (stored === "light" || stored === "dark") {
            theme = stored;
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        } catch (_error) {
          theme = "light";
        }

        root.classList.remove("light", "dark");
        root.classList.add(theme);
        root.dataset.theme = theme;
        root.style.colorScheme = theme;

        var themeColor = theme === "dark" ? "#0F172A" : "#FFC107";
        var themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) {
          themeMeta.setAttribute("content", themeColor);
        }
      })();
    </script>
    <title>CampusRide – Smart Campus Transport</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/favicon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="description" content="Book safe, affordable e-rickshaw rides inside your university in seconds. Real-time tracking, verified drivers." />
    <meta name="author" content="CampusRide" />

    <meta property="og:title" content="CampusRide – Smart Campus Transport" />
    <meta property="og:description" content="Book safe, affordable e-rickshaw rides inside your university in seconds." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/campusride-icon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@CampusRide" />
    <meta name="twitter:image" content="/campusride-icon.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
