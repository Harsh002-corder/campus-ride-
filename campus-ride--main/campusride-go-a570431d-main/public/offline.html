<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Campus Ride Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #ffffff;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(15, 23, 42, 0.08), transparent 40%),
          linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
        padding: 24px;
      }

      .card {
        width: min(100%, 460px);
        padding: 32px 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(148, 163, 184, 0.24);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: #0f172a;
        color: #ffffff;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: clamp(1.8rem, 4vw, 2.3rem);
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">CR</div>
      <h1>You are offline.</h1>
      <p>Reconnect to continue booking rides.</p>
    </main>
  </body>
</html>
